<!DOCTYPE html>
<html land="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand-Drawn Image Classifier</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
    <body>
        <div class="row-container" style="width: fit-content;">
            <div class="column-container" style="width: fit-content;">
                <h1>Hand-Drawn Image Classifier</h1>
                
                <div id="toolbar">
                    <button class="tool-btn active" id="btn-brush" onclick="setTool('brush')">
                    <i class="ti ti-pencil"></i> Brush
                    </button>
                    <button class="tool-btn" id="btn-eraser" onclick="setTool('eraser')">
                    <i class="ti ti-eraser"></i> Eraser
                    </button>
                    <button class="tool-btn" id="btn-line" onclick="setTool('line')">
                    <i class="ti ti-line"></i> Line
                    </button>
                    <button class="tool-btn" id="btn-rect" onclick="setTool('rect')">
                    <i class="ti ti-rectangle"></i> Rect
                    </button>
                    <button class="tool-btn" id="btn-circle" onclick="setTool('circle')">
                    <i class="ti ti-circle"></i> Circle
                    </button>
                    </button>
                    <div class="sep"></div>
                    <button class="tool-btn" onclick="undo()" title="Undo">
                    <i class="ti ti-arrow-back-up"></i> Undo
                    </button>
                    <button class="tool-btn" onclick="redo()" title="Redo">
                    <i class="ti ti-arrow-forward-up"></i> Redo
                    </button>
                    <div class="sep"></div>
                    <button class="tool-btn" onclick="clearCanvas()">
                    <i class="ti ti-trash"></i> Clear
                    </button>
                    <button class="tool-btn" onclick="predict()">
                    <i class="ti ti-download"></i> Predict
                    </button>
                </div>

                <div id="controls">
                    <div class="ctrl-group">
                    <label>Color</label>
                    <input type="color" id="colorPicker" value="#2c2c2a">
                    </div>
                    <div id="swatchRow"></div>
                    <div class="ctrl-group" style="flex:1; min-width:140px;">
                    <label>Size</label>
                    <input type="range" id="brushSize" min="1" max="60" step="1" value="3" style="flex:1;">
                    <span class="out" id="sizeOut">3px</span>
                    </div>
                    <div class="ctrl-group" style="flex:1; min-width:140px;">
                    <label>Opacity</label>
                    <input type="range" id="opacitySlider" min="1" max="100" step="1" value="100" style="flex:1;">
                    <span class="out" id="opacityOut">100%</span>
                    </div>
                </div>

                <div class="row-container">
                    <div id="canvasWrap">
                        <canvas id="drawCanvas"></canvas>
                    </div>
                    <div class="column-container" style="width: 30%; height: 250px;">
                        <h1>Predictions:</h1>
                        <div id="predictionList">
                            <h4>~</h4>
                            <h4>~</h4>
                            <h4>~</h4>
                            <h4>~</h4>
                            <h4>~</h4>

                        </div>
                    </div>
                </div>

                <p>Model input preview:</p>
                <canvas id="previewCanvas" style="width: 128px; height: 128px; border: 1px solid #ccc; image-rendering: pixelated;"></canvas>

                <div id="statusBar">
                    <span id="coordLabel">x: 0, y: 0</span>
                    <span id="toolLabel">Tool: brush</span>
                </div>

            </div>    
        </div>
    </body>

    <script src="main.js"></script>
</html>
